name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  COLLECTORS_REPO: ${{ vars.COLLECTORS_REPO || format('{0}/platform-collectors', github.repository_owner) }}

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/postgres?sslmode=require
      EXTERNAL_ID_ENCRYPTION_KEY: ci-test-encryption-key
      SUPABASE_URL: https://ci.example.supabase.co
    steps:
      - uses: actions/checkout@v4

      - name: Checkout platform-collectors
        uses: ./.github/actions/checkout-collectors
        with:
          collectors-repo: ${{ env.COLLECTORS_REPO }}
          token: ${{ secrets.COLLECTORS_REPO_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install -e ./platform-collectors

      - name: Run tests
        run: pytest tests/ -q --ignore=tests/integration

      - name: Ruff
        run: ruff check src tests
        continue-on-error: true
