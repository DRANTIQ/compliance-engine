# P5 Wave 1 — compute security checks (Lambda, GuardDuty, EC2, EBS, SG)
# Generated into policy/catalog/policies/AWS_CMP_*.yaml by build_policy_catalog.py

version: "1.0.0"
pack_id: pack_aws_compute_security
policies:
  - policy_id: AWS_CMP_001
    control_ref: lambda-public-invoke
    domain: compute
    severity: high
    display_title: Lambda function allows public invocation
    title: Lambda function must not allow public invocation
    resource_type: compute.function
    provider_type: aws_lambda_function
    collector: lambda
    nist_mappings: [AC-3, SI-4]
    logic:
      type: fail_when
      condition:
        type: field_check
        path: properties.publicly_accessible
        operator: eq
        expected: true
    evidence_fields: [properties.function_name, properties.publicly_accessible]

  - policy_id: AWS_CMP_002
    control_ref: lambda-url-no-auth
    domain: compute
    severity: critical
    display_title: Lambda function URL without authentication
    title: Lambda function URL must not use unauthenticated access
    resource_type: compute.function
    provider_type: aws_lambda_function
    collector: lambda
    nist_mappings: [AC-3, SC-7]
    logic:
      type: fail_when
      condition:
