    resource_type: database.instance
    provider_type: aws_rds_instance
    collector: database
    nist_mappings: [CP-2, SC-28]
    logic:
      type: fail_when
      condition:
        type: field_check
        path: properties.multi_az
        operator: eq
        expected: false
    evidence_fields: [properties.db_instance_identifier, properties.multi_az]

