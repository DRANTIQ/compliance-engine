# P5 Wave 3 — CIS AWS Database Services–aligned checks
# Reference: compliance-frameworks/cis/aws/database/ (engineering only)
# Extends pack_aws_data (RDS 001–003 remain from foundations)

version: "1.0.0"
pack_id: pack_aws_data
policies:
  - policy_id: AWS_RDS_004
    control_ref: rds-backup-retention
    domain: data
    severity: medium
    display_title: RDS backup retention below 7 days
    title: RDS instances must retain automated backups for at least 7 days
    resource_type: database.instance
    provider_type: aws_rds_instance
    collector: database
    nist_mappings: [CP-2, SC-28]
    logic:
      type: fail_when
      condition:
        type: field_check
        path: properties.backup_retention_period
        operator: lt
        expected: 7
    evidence_fields: [properties.db_instance_identifier, properties.backup_retention_period]

  - policy_id: AWS_RDS_005
    control_ref: rds-single-az
    domain: data
    severity: medium
    display_title: RDS instance not configured for Multi-AZ
