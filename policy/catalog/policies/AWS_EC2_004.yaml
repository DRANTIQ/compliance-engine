title: EC2 instances must not disable source/destination checks
provider: aws
resource_type: compute.instance
provider_type: aws_ec2_instance
severity: medium
description: EC2 instances must not disable source/destination checks
logic:
  type: fail_when
  condition:
    type: compound
    operator: and
    conditions:
