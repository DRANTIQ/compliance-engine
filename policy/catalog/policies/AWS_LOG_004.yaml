policy_id: AWS_LOG_004
title: KMS key rotation must be enabled
provider: aws
resource_type: security.key
provider_type: aws_kms_key
severity: medium
description: Customer-managed KMS keys must have automatic rotation enabled (CIS 4.6).
logic:
  type: fail_when
  condition:
    type: compound
    operator: or
    conditions:
    - type: field_check
      path: properties.key_rotation_enabled
      operator: missing
    - type: field_check
      path: properties.key_rotation_enabled
      operator: eq
      expected: false
evidence_fields:
- properties.key_id
- properties.key_rotation_enabled
remediation:
  headline: KMS key rotation disabled
  risk_summary: Customer-managed KMS keys must have automatic rotation enabled (CIS
    4.6).
  business_impact: This misconfiguration may lead to unauthorized access or compliance
    failure.
  fix_summary: 'Remediate in AWS: KMS key rotation must be enabled'
  estimated_fix_minutes: 3
  framework_mappings:
  - CIS 4.6
  - SOC2 CC7.1
display_title: KMS key rotation disabled
