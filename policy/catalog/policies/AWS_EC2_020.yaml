policy_id: AWS_EC2_020
title: Running EC2 instances should not disable the instance metadata endpoint
provider: aws
resource_type: compute.instance
provider_type: aws_ec2_instance
severity: medium
description: Running EC2 instances should not disable the instance metadata endpoint
logic:
  type: fail_when
  condition:
    type: compound
    operator: and
    conditions:
    - type: field_check
      path: properties.state
      operator: eq
      expected: running
    - type: field_check
      path: properties.http_endpoint
      operator: eq
      expected: disabled
evidence_fields:
- properties.instance_id
- properties.http_endpoint
remediation:
  headline: EC2 IMDS endpoint disabled on running instance
  risk_summary: Running EC2 instances should not disable the instance metadata endpoint
  business_impact: This misconfiguration may increase attack surface or reduce threat
    detection coverage.
  fix_summary: 'Remediate in AWS: Running EC2 instances should not disable the instance
    metadata endpoint'
  estimated_fix_minutes: 3
  framework_mappings:
  - NIST CM-2
  - NIST SI-4
  - SOC2 CC6.8
display_title: EC2 IMDS endpoint disabled on running instance
pack_id: pack_aws_compute
