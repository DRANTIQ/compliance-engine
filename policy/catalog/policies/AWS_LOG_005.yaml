policy_id: AWS_LOG_005
title: VPC flow logging must be enabled
provider: aws
resource_type: network.vpc
provider_type: aws_ec2_vpc
severity: medium
description: VPC flow logs must be enabled and active (CIS 4.7).
logic:
  type: fail_when
  condition:
    type: compound
    operator: or
    conditions:
    - type: field_check
      path: properties.flow_logs_enabled
      operator: missing
    - type: field_check
      path: properties.flow_logs_enabled
      operator: eq
      expected: false
evidence_fields:
- properties.vpc_id
- properties.flow_logs_enabled
remediation:
  headline: VPC flow logging disabled
  risk_summary: "Network traffic is not logged \u2014 blind to lateral movement."
  business_impact: Attackers could move undetected inside your network.
  fix_summary: Enable VPC Flow Logs on the VPC.
  estimated_fix_minutes: 5
  framework_mappings:
  - CIS 4.7
  - NIST AU-12
  - SOC2 CC7.2
display_title: VPC flow logs disabled
pack_id: pack_aws_logging
version: 1.0.0
