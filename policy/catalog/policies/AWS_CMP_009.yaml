policy_id: AWS_CMP_009
version: 1.0.0
title: GuardDuty EKS audit log monitoring must be enabled
provider: aws
resource_type: security.detector
provider_type: aws_guardduty_detector
severity: medium
description: GuardDuty EKS audit log monitoring must be enabled
logic:
  type: fail_when
  condition:
    type: compound
    operator: and
    conditions:
    - type: field_check
      path: properties.enabled
      operator: eq
      expected: true
    - type: field_check
      path: properties.eks_audit_logs_enabled
      operator: eq
      expected: false
evidence_fields:
- properties.region
- properties.eks_audit_logs_enabled
remediation:
  headline: GuardDuty EKS audit log monitoring disabled
  risk_summary: GuardDuty EKS audit log monitoring must be enabled
  business_impact: This misconfiguration may increase attack surface or reduce threat
    detection coverage.
  fix_summary: 'Remediate in AWS: GuardDuty EKS audit log monitoring must be enabled'
  estimated_fix_minutes: 3
  framework_mappings:
  - NIST SI-4
  - NIST AU-2
  - SOC2 CC7.1
display_title: GuardDuty EKS audit log monitoring disabled
pack_id: pack_aws_compute_security
