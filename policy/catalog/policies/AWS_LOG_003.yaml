policy_id: AWS_LOG_003
title: CloudTrail logs must use KMS encryption
provider: aws
resource_type: governance.trail
provider_type: aws_cloudtrail_trail
severity: medium
description: CloudTrail trails must encrypt logs with a KMS key (CIS 4.5).
logic:
  type: fail_when
  condition:
    type: field_check
    path: properties.kms_key_id
    operator: missing
evidence_fields:
- properties.name
- properties.kms_key_id
remediation:
  headline: CloudTrail logs not KMS encrypted
  risk_summary: CloudTrail trails must encrypt logs with a KMS key (CIS 4.5).
  business_impact: This misconfiguration may lead to unauthorized access or compliance
    failure.
  fix_summary: 'Remediate in AWS: CloudTrail logs must use KMS encryption'
  estimated_fix_minutes: 3
  framework_mappings:
  - CIS 4.5
  - SOC2 CC7.1
display_title: CloudTrail logs not KMS encrypted
pack_id: pack_aws_logging
