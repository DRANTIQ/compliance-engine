policy_id: AWS_LOG_001
title: CloudTrail log file validation must be enabled
provider: aws
resource_type: governance.trail
provider_type: aws_cloudtrail_trail
severity: medium
description: CloudTrail log file integrity validation must be enabled (CIS 4.2).
logic:
  type: fail_when
  condition:
    type: compound
    operator: or
    conditions:
    - type: field_check
      path: properties.log_file_validation_enabled
      operator: missing
    - type: field_check
      path: properties.log_file_validation_enabled
      operator: eq
      expected: false
evidence_fields:
- properties.name
- properties.log_file_validation_enabled
remediation:
  headline: CloudTrail log validation disabled
  risk_summary: CloudTrail logs cannot be verified for tampering.
  business_impact: Audit trail integrity cannot be guaranteed.
  fix_summary: Enable log file validation on the CloudTrail trail.
  estimated_fix_minutes: 3
  framework_mappings:
  - CIS 4.2
  - SOC2 CC7.2
  - NIST AU-9
  aws_cli: aws cloudtrail update-trail --name {trail_name} --enable-log-file-validation
display_title: CloudTrail log validation disabled
pack_id: pack_aws_logging
