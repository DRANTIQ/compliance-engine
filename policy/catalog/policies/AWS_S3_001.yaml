policy_id: AWS_S3_001
title: S3 bucket policy must deny HTTP requests
provider: aws
resource_type: storage.bucket
provider_type: aws_s3_bucket
severity: high
description: S3 bucket policy must deny requests that are not sent over HTTPS (CIS
  3.1.1).
logic:
  type: fail_when
  condition:
    type: compound
    operator: or
    conditions:
    - type: field_check
      path: properties.denies_insecure_transport
      operator: missing
    - type: field_check
      path: properties.denies_insecure_transport
      operator: eq
      expected: false
evidence_fields:
- properties.name
- properties.denies_insecure_transport
remediation:
  headline: S3 bucket allows insecure HTTP access
  risk_summary: Data in transit to this bucket may be intercepted over unencrypted
    HTTP.
  business_impact: Compliance violations and data interception risk.
  fix_summary: Add a bucket policy that denies requests over HTTP.
  estimated_fix_minutes: 5
  framework_mappings:
  - CIS 3.1.1
  - SOC2 CC6.1
  - SOC2 CC6.6
display_title: S3 bucket allows insecure HTTP
pack_id: pack_aws_storage
