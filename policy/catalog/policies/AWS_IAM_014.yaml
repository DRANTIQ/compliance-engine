policy_id: AWS_IAM_014
title: IAM Access Analyzer must be enabled
provider: aws
resource_type: identity.account
provider_type: aws_iam_access_analyzer
severity: medium
description: IAM Access Analyzer must be enabled with ACTIVE status (CIS 2.19).
logic:
  type: fail_when
  condition:
    type: field_check
    path: properties.status
    operator: ne
    expected: ACTIVE
evidence_fields:
- properties.name
- properties.status
- properties.region
remediation:
  headline: IAM Access Analyzer disabled
  risk_summary: Unused access paths may go undetected.
  business_impact: Over-permissive IAM policies may persist unnoticed.
  fix_summary: Create and enable IAM Access Analyzer.
  estimated_fix_minutes: 3
  framework_mappings:
  - CIS 2.19
  - NIST AC-2
  - SOC2 CC6.1
display_title: IAM Access Analyzer disabled
pack_id: pack_aws_identity
