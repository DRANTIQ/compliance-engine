policy_id: AWS_NET_007
title: EC2 instances must require IMDSv2
provider: aws
resource_type: compute.instance
provider_type: aws_ec2_instance
severity: high
description: EC2 instances must require IMDSv2 (HttpTokens=required) (CIS 6.7).
logic:
  type: fail_when
  condition:
    type: compound
    operator: and
    conditions:
      - type: field_check
        path: properties.state
        operator: ne
        expected: terminated
      - type: field_check
        path: properties.http_tokens
        operator: ne
        expected: required
evidence_fields:
  - properties.instance_id
  - properties.state
  - properties.http_tokens
