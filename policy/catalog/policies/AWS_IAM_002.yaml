policy_id: AWS_IAM_002
title: Root user must have MFA enabled
provider: aws
resource_type: identity.account
provider_type: aws_iam_account
severity: critical
description: Ensure MFA is enabled on the root user when a root password exists (CIS
  2.4).
logic:
  type: fail_when
  condition:
    type: compound
    operator: and
    conditions:
    - type: field_check
      path: properties.root_password_present
      operator: eq
      expected: true
    - type: compound
      operator: or
      conditions:
      - type: field_check
        path: properties.root_mfa_enabled
        operator: missing
      - type: field_check
        path: properties.root_mfa_enabled
        operator: eq
        expected: false
evidence_fields:
- properties.account_id
- properties.root_password_present
- properties.root_mfa_enabled
remediation:
  headline: Root account missing MFA
  risk_summary: Ensure MFA is enabled on the root user when a root password exists
    (CIS 2.4).
  business_impact: This misconfiguration may lead to unauthorized access or compliance
    failure.
  fix_summary: 'Remediate in AWS: Root user must have MFA enabled'
  estimated_fix_minutes: 5
  framework_mappings:
  - CIS 2.4
  - SOC2 CC6.1
display_title: Root account missing MFA
pack_id: pack_aws_identity
