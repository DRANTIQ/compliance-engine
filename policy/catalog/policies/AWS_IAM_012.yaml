policy_id: AWS_IAM_012
title: EC2 instances must use IAM instance roles
provider: aws
resource_type: compute.instance
provider_type: aws_ec2_instance
severity: medium
description: Non-terminated EC2 instances must have an IAM instance profile attached (CIS 2.17).
logic:
  type: fail_when
  condition:
    type: compound
    operator: and
    conditions:
      - type: field_check
        path: properties.state
        operator: ne
        expected: terminated
      - type: field_check
        path: properties.iam_instance_profile_arn
        operator: missing
evidence_fields:
  - properties.instance_id
  - properties.state
  - properties.iam_instance_profile_arn
