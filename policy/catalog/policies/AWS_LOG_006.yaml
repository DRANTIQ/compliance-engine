policy_id: AWS_LOG_006
title: AWS Security Hub must be enabled
provider: aws
resource_type: governance.hub
provider_type: aws_securityhub_hub
severity: medium
description: AWS Security Hub must be enabled in each region (CIS 5.16).
logic:
  type: fail_when
  condition:
    type: compound
    operator: or
    conditions:
    - type: field_check
      path: properties.enabled
      operator: missing
    - type: field_check
      path: properties.enabled
      operator: eq
      expected: false
evidence_fields:
- properties.region
- properties.enabled
remediation:
  headline: AWS Security Hub disabled
  risk_summary: Centralized security findings are not aggregated.
  business_impact: Security gaps may go unnoticed across services.
  fix_summary: Enable AWS Security Hub in the account and region.
  estimated_fix_minutes: 3
  framework_mappings:
  - CIS 5.16
  - NIST SI-4
  - SOC2 CC7.3
display_title: Security Hub not enabled
pack_id: pack_aws_logging
