policy_id: AWS_LOG_006
title: AWS Security Hub must be enabled
provider: aws
resource_type: governance.hub
provider_type: aws_securityhub_hub
severity: medium
description: AWS Security Hub must be enabled in each region (CIS 5.16).
logic:
  type: fail_when
  condition:
    type: compound
    operator: or
    conditions:
      - type: field_check
        path: properties.enabled
        operator: missing
      - type: field_check
        path: properties.enabled
        operator: eq
        expected: false
evidence_fields:
  - properties.region
  - properties.enabled
