policy_id: AWS_IAM_013
title: Expired IAM SSL/TLS certificates must be removed
provider: aws
resource_type: identity.certificate
provider_type: aws_iam_server_certificate
severity: medium
description: IAM server certificates past their expiration date must be removed (CIS
  2.18).
logic:
  type: fail_when
  condition:
    type: field_check
    path: properties.is_expired
    operator: eq
    expected: true
evidence_fields:
- properties.name
- properties.expiration
- properties.is_expired
remediation:
  headline: Expired IAM server certificate
  risk_summary: IAM server certificates past their expiration date must be removed
    (CIS 2.18).
  business_impact: This misconfiguration may lead to unauthorized access or compliance
    failure.
  fix_summary: 'Remediate in AWS: Expired IAM SSL/TLS certificates must be removed'
  estimated_fix_minutes: 3
  framework_mappings:
  - CIS 2.18
  - SOC2 CC6.6
display_title: Expired IAM server certificate
pack_id: pack_aws_identity
