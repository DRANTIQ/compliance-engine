policy_id: AWS_NET_002
title: CIFS access must be restricted
provider: aws
resource_type: network.security_group
provider_type: aws_ec2_security_group
severity: medium
description: Security groups must not allow unrestricted CIFS (port 445) access (CIS
  6.1.2).
logic:
