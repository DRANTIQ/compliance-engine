  - policy_id: AZURE_DEF_001
    control_ref: defender-standard
    domain: security
    severity: high
    display_title: Microsoft Defender for Cloud standard tier not enabled
    title: Microsoft Defender for Cloud standard pricing must be enabled
    resource_type: governance.hub
    provider_type: azure_defender
    collector: defender
    nist_mappings: [SI-4, RA-5]
    soc2_mappings: [CC7.3]
    logic:
      type: fail_when
      condition:
        type: compound
        operator: or
        conditions:
          - type: field_check
            path: properties.defender_standard_enabled
            operator: missing
          - type: field_check
            path: properties.defender_standard_enabled
            operator: eq
            expected: false
    evidence_fields: [properties.subscription_id, properties.defender_standard_enabled]
    azure_cli: az security pricing create --name VirtualMachines --tier Standard
    azure_portal_steps:
      - Open Microsoft Defender for Cloud → Environment settings
      - Select the subscription → Defender plans
      - Set relevant plans to On (Standard)

  - policy_id: AZURE_ID_001
    control_ref: subscription-owner-limit
    domain: identity
    severity: high
    display_title: Too many subscription owners assigned
    title: Subscription must have at most three Owner role assignments
    resource_type: identity.account
    provider_type: azure_subscription
    collector: identity
    nist_mappings: [AC-2, AC-5]
    soc2_mappings: [CC6.3]
    logic:
      type: fail_when
      condition:
        type: compound
        operator: or
        conditions:
          - type: field_check
            path: properties.too_many_owners
            operator: eq
            expected: true
          - type: field_check
            path: properties.owner_role_assignment_count
            operator: gt
            expected: 3
    evidence_fields: [properties.subscription_id, properties.owner_role_assignment_count]
    azure_cli: az role assignment list --scope /subscriptions/{account_id} --role Owner
    azure_portal_steps:
      - Open Subscription → Access control (IAM)
      - Review Owner assignments and remove excess privileged access

