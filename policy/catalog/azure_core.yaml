# Azure core security pack — MVP automated checks (Phase 4)
# Generated into policy/catalog/policies/AZURE_*.yaml by build_policy_catalog.py

version: "1.0.0"
pack_id: pack_azure_core
policies:
  - policy_id: AZURE_STG_001
    control_ref: storage-https-required
    domain: storage
    severity: high
    display_title: Storage account allows insecure HTTP
    title: Storage account must require secure transfer (HTTPS)
    resource_type: storage.bucket
    provider_type: azure_storage_account
    collector: storage
    nist_mappings: [SC-8, SC-13]
    soc2_mappings: [CC6.1, CC6.6]
    logic:
      type: fail_when
      condition:
        type: compound
        operator: or
        conditions:
          - type: field_check
            path: properties.enable_https_traffic_only
            operator: missing
          - type: field_check
            path: properties.enable_https_traffic_only
            operator: eq
            expected: false
    evidence_fields: [properties.name, properties.enable_https_traffic_only]
    azure_cli: >-
      az storage account update --name {resource_name} --resource-group {resource_group}
      --https-only true
    azure_portal_steps:
      - Open the storage account in Azure Portal
      - Configuration → set Secure transfer required to Enabled
      - Save

  - policy_id: AZURE_STG_002
    control_ref: storage-tls-12
    domain: storage
    severity: high
    display_title: Storage account minimum TLS below 1.2
    title: Storage account must enforce minimum TLS 1.2
    resource_type: storage.bucket
    provider_type: azure_storage_account
    collector: storage
    nist_mappings: [SC-8, SC-13]
    soc2_mappings: [CC6.1]
    logic:
      type: fail_when
      condition:
        type: compound
        operator: or
        conditions:
          - type: field_check
            path: properties.min_tls_1_2
            operator: missing
          - type: field_check
            path: properties.min_tls_1_2
            operator: eq
            expected: false
    evidence_fields: [properties.name, properties.minimum_tls_version]
    azure_cli: >-
      az storage account update --name {resource_name} --resource-group {resource_group}
      --min-tls-version TLS1_2
    azure_portal_steps:
      - Open the storage account → Configuration
      - Set Minimum TLS version to Version 1.2
      - Save

  - policy_id: AZURE_STG_003
    control_ref: storage-no-public-blob
    domain: storage
    severity: critical
    display_title: Storage account allows public blob access
    title: Storage account must disable anonymous blob public access
    resource_type: storage.bucket
    provider_type: azure_storage_account
    collector: storage
    nist_mappings: [AC-3, SC-7]
    soc2_mappings: [CC6.6]
    logic:
      type: fail_when
      condition:
        type: compound
        operator: or
        conditions:
          - type: field_check
            path: properties.allow_blob_public_access
            operator: missing
          - type: field_check
            path: properties.allow_blob_public_access
            operator: eq
            expected: true
    evidence_fields: [properties.name, properties.allow_blob_public_access]
    azure_cli: >-
      az storage account update --name {resource_name} --resource-group {resource_group}
      --allow-blob-public-access false
    azure_portal_steps:
      - Open the storage account → Configuration
      - Set Allow blob public access to Disabled
      - Save

  - policy_id: AZURE_NET_001
    control_ref: nsg-no-ssh-internet
    domain: network
    severity: high
    display_title: NSG allows SSH from the internet
    title: Network security group must not allow SSH (22) from 0.0.0.0/0
    resource_type: network.security_group
    provider_type: azure_network_security_group
    collector: network
    nist_mappings: [AC-4, SC-7]
    soc2_mappings: [CC6.4]
    logic:
      type: fail_when
      condition:
        type: field_check
        path: properties.allows_ssh_from_internet_ipv4
        operator: eq
        expected: true
    evidence_fields: [properties.name, properties.allows_ssh_from_internet_ipv4]
    azure_cli: >-
      az network nsg rule list --nsg-name {resource_name} --resource-group {resource_group}
      --query "[?access=='Allow' && direction=='Inbound']"
    azure_portal_steps:
      - Open the NSG → Inbound security rules
      - Remove or restrict rules allowing TCP 22 from Any / Internet

  - policy_id: AZURE_NET_002
    control_ref: nsg-no-rdp-internet
    domain: network
    severity: high
    display_title: NSG allows RDP from the internet
    title: Network security group must not allow RDP (3389) from 0.0.0.0/0
    resource_type: network.security_group
    provider_type: azure_network_security_group
    collector: network
    nist_mappings: [AC-4, SC-7]
    soc2_mappings: [CC6.4]
    logic:
      type: fail_when
      condition:
        type: field_check
