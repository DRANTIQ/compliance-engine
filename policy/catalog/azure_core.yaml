    resource_type: database.instance
    provider_type: null
    collector: database
    nist_mappings: [AC-4, SC-7]
    soc2_mappings: [CC6.4]
    logic:
      type: fail_when
      condition:
        type: field_check
        path: properties.publicly_accessible
        operator: eq
        expected: true
    evidence_fields: [properties.name, properties.public_network_access]
    azure_cli: >-
