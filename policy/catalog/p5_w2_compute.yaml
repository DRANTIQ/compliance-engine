# P5 Wave 2 — CIS AWS Compute Services–aligned checks (EC2, AMI, EBS, SG)
# Reference: compliance-frameworks/cis/aws/compute/ (engineering only)
# Generated into policy/catalog/policies/AWS_EC2_*.yaml by build_policy_catalog.py

version: "1.0.0"
pack_id: pack_aws_compute
policies:
  - policy_id: AWS_EC2_001
    control_ref: ec2-termination-protection
    domain: compute
    severity: medium
    display_title: EC2 instance without termination protection
    title: Running EC2 instances must have termination protection enabled
    resource_type: compute.instance
    provider_type: aws_ec2_instance
    collector: ec2
    nist_mappings: [CM-2, CP-2]
    logic:
      type: fail_when
      condition:
        type: compound
        operator: and
        conditions:
          - type: field_check
            path: properties.state
            operator: eq
            expected: running
          - type: field_check
            path: properties.termination_protected
            operator: eq
            expected: false
    evidence_fields: [properties.instance_id, properties.termination_protected]

  - policy_id: AWS_EC2_002
    control_ref: ec2-imds-hop-limit
    domain: compute
    severity: high
    display_title: EC2 IMDS hop limit allows container SSRF
    title: EC2 IMDS hop limit must not exceed 1
    resource_type: compute.instance
    provider_type: aws_ec2_instance
    collector: ec2
    nist_mappings: [AC-4, SC-7]
    logic:
      type: fail_when
      condition:
        type: compound
        operator: and
        conditions:
          - type: field_check
            path: properties.state
            operator: ne
            expected: terminated
          - type: field_check
            path: properties.http_put_response_hop_limit
            operator: gt
            expected: 1
    evidence_fields: [properties.instance_id, properties.http_put_response_hop_limit]

  - policy_id: AWS_EC2_003
    control_ref: ec2-imds-optional-tokens
    domain: compute
    severity: high
    display_title: EC2 instance allows optional IMDSv2 tokens
    title: EC2 instances must require IMDSv2 when metadata endpoint is enabled
    resource_type: compute.instance
    provider_type: aws_ec2_instance
    collector: ec2
    nist_mappings: [AC-4, SC-7]
    logic:
      type: fail_when
      condition:
        type: compound
        operator: and
        conditions:
          - type: field_check
            path: properties.state
            operator: ne
            expected: terminated
          - type: field_check
            path: properties.http_endpoint
            operator: eq
            expected: enabled
          - type: field_check
            path: properties.http_tokens
            operator: ne
            expected: required
    evidence_fields: [properties.instance_id, properties.http_tokens, properties.http_endpoint]

